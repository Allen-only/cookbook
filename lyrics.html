<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinyarwanda Lyrics Hub - Offline</title>
<style>
body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    padding: 20px; 
    background:#f0f4f8 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><text x="0" y="20" fill="rgba(0,0,0,0.05)" font-size="20">&#9835;</text></svg>') repeat; 
}
h1 { color:#2c3e50; font-size:2em; margin-bottom:10px; }
input { padding:10px; width:250px; margin:10px; border-radius:5px; border:1px solid #ccc; }
button { padding:10px 15px; margin:10px; border-radius:5px; border:none; background:#3498db; color:white; cursor:pointer; }
button:hover { background:#2980b9; }
#lyrics { margin-top:20px; white-space:pre-wrap; background:#fff; padding:20px; border-radius:12px; text-align:left; max-width:650px; margin:auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
#favorites { margin-top:20px; max-width:650px; margin:auto; text-align:left; background:#eef; padding:15px; border-radius:10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.favorite-card { 
    cursor:pointer; 
    border-left: 6px solid #3498db; 
    margin:6px 0; 
    padding:10px 15px; 
    border-radius:6px; 
    background:#fff; 
    display:flex; 
    align-items:center; 
    gap:10px;
    transition: transform 0.2s, box-shadow 0.2s;
}
.favorite-card:hover { 
    transform: translateX(4px); 
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.favorite-icon { font-size:20px; color:#3498db; }
.favorite-info { text-align:left; }
.song-title { font-weight:bold; }
.artist-name { font-size:0.9em; color:#555; }
audio { margin-top:10px; width:100%; max-width:650px; }
</style>
</head>
<body>
<h1>Kinyarwanda Lyrics Hub - Offline</h1>

<input type="text" id="songName" placeholder="Enter song name" />
<button onclick="searchLyrics()">Search Lyrics</button>
<button onclick="generateLyrics()">Generate Lyrics</button>

<div id="lyrics"></div>

<h3>Favorites</h3>
<div id="favorites"></div>

<audio id="player" controls></audio>

<script>
// Built-in lyrics database with optional local audio files
const lyricsDB = [
    { song:"Urukundo rw’Ukuri", artist:"New Artist", lyrics:"Urukundo rw’ukuri ruratwubaka...\nChorus: Twese hamwe mu rukundo rw’ukuri...", audio:"audio/urukundo_rw_ukuri.mp3" },
    { song:"Indirimbo Yacu", artist:"Artist2", lyrics:"Indirimbo yacu, y’ishyaka...\nTuri hamwe, twese...", audio:"audio/indirimbo_yacu.mp3" },
    { song:"Umucyo", artist:"Artist3", lyrics:"Umucyo uraza, utwibutsa ibyiza...\nTugende hamwe...", audio:"audio/umucyo.mp3" }
];

// Favorites
let favorites = [];

// Colors for card borders
const colors = ["#e74c3c", "#3498db", "#2ecc71", "#9b59b6", "#f39c12"];

function updateFavorites() {
    const favDiv = document.getElementById('favorites');
    favDiv.innerHTML = '';
    favorites.forEach((f, i) => {
        const card = document.createElement('div');
        card.className = 'favorite-card';
        card.style.borderLeftColor = colors[i % colors.length];

        const icon = document.createElement('span');
        icon.className = 'favorite-icon';
        icon.innerHTML = '&#9835;'; // music note

        const info = document.createElement('div');
        info.className = 'favorite-info';
        const title = document.createElement('div');
        title.className = 'song-title';
        title.innerText = f.song;
        const artist = document.createElement('div');
        artist.className = 'artist-name';
        artist.innerText = f.artist;

        info.appendChild(title);
        info.appendChild(artist);

        card.appendChild(icon);
        card.appendChild(info);

        // Play audio and show lyrics on click
        card.onclick = () => {
            document.getElementById('lyrics').innerText = f.lyrics;
            const player = document.getElementById('player');
            if(f.audio) {
                player.src = f.audio;
                player.play();
            } else {
                player.pause();
                player.src = "";
            }
        };

        favDiv.appendChild(card);
    });
}

// Search built-in lyrics
function searchLyrics() {
    const song = document.getElementById('songName').value.toLowerCase();
    const result = lyricsDB.find(l => l.song.toLowerCase() === song);
    const lyricsDiv = document.getElementById('lyrics');
    if(result) {
        lyricsDiv.innerText = result.lyrics;
        if(!favorites.find(f => f.song === result.song)) {
            favorites.push(result);
            updateFavorites();
        }
    } else {
        lyricsDiv.innerText = "Lyrics not found in database.";
    }
}

// Offline AI-like lyrics generation
function generateLyrics() {
    const song = document.getElementById('songName').value || "Untitled Song";
    const lyricsDiv = document.getElementById('lyrics');

    const lines = [
        `Urukundo rw’ukuri, ${song} turaririmbye`,
        `Turi hamwe mu rukundo rw'ibyishimo`,
        `Chorus: Twese hamwe, dufatanye mu rukundo rw’ukuri`,
        `Icyizere n’umunezero biruzura imitima yacu`,
        `Tugende imbere, dukomeze gukundana nta kabuza`
    ];

    let generated = "";
    for(let i=0; i<4; i++) {
        generated += lines[Math.floor(Math.random() * lines.length)] + "\n";
    }

    lyricsDiv.innerText = generated;
    favorites.push({ song: song + " (Generated)", artist:"Offline AI", lyrics:generated });
    updateFavorites();
}

// Initialize favorites display
updateFavorites();
</script>
</body>
</html>
