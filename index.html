}else{
menu.style.display="block";
}
}
</script>

</head>

<body class="home-bg">

<!-- Navigation bar -->

</div>

<div id="menu" class="menu">



</div>

<h1>Welcome To Our CookBook</h1>

Discover delicious recipes and learn amazing cooking ideas from our website.
</p>

</div>
