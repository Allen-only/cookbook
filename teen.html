<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeenGram Feed</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    background: #fafafa;
  }

  /* Navbar */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    padding: 10px 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .navbar h1 {
    color: #ff2d55;
    font-size: 24px;
  }
  .navbar button {
    background: #ff2d55;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
  }

  /* Feed */
  .feed {
    max-width: 500px;
    margin: 20px auto;
    padding: 0 10px;
  }

  .post {
    background: #fff;
    margin-bottom: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .post-header {
    display: flex;
    align-items: center;
    padding: 10px;
  }

  .post-header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
  }

  .post-header h4 {
    margin: 0;
  }

  .post img {
    width: 100%;
    display: block;
  }

  .post-actions {
    display: flex;
    justify-content: space-between;
    padding: 10px;
  }

  .post-actions button {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 18px;
  }

  .post-caption {
    padding: 0 10px 10px 10px;
  }

  /* Comments section */
  .comments {
    padding: 0 10px 10px 10px;
    font-size: 14px;
    color: #555;
  }

  .comment-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #eee;
  }
  .comment-input input {
    flex: 1;
    padding: 8px;
    border-radius: 20px;
    border: 1px solid #ccc;
  }
  .comment-input button {
    margin-left: 10px;
    background: #ff2d55;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 6px 12px;
    cursor: pointer;
  }

</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <h1>TeenGram</h1>
  <button onclick="logout()">Logout</button>
</div>

<!-- Feed -->
<div class="feed" id="feedPage">

  <!-- Sample Post 1 -->
  <div class="post">
    <div class="post-header">
      <img src="https://via.placeholder.com/40.png?text=E" alt="profile">
      <h4>Emily</h4>
    </div>
    <img src="https://via.placeholder.com/400x300.png?text=Fun+Post+1" alt="post1">
    <div class="post-actions">
      <button onclick="likePost(this)">❤️ Like</button>
      <button>💬 Comment</button>
    </div>
    <div class="post-caption"><b>Emily:</b> Loving my weekend vibes! 😎</div>
    <div class="comments" id="comments1">No comments yet.</div>
    <div class="comment-input">
      <input type="text" placeholder="Add a comment..." id="input1">
      <button onclick="addComment('input1','comments1')">Post</button>
    </div>
  </div>

  <!-- Sample Post 2 -->
  <div class="post">
    <div class="post-header">
      <img src="https://via.placeholder.com/40.png?text=J" alt="profile">
      <h4>Jake</h4>
    </div>
    <img src="https://via.placeholder.com/400x300.png?text=Fun+Post+2" alt="post2">
    <div class="post-actions">
      <button onclick="likePost(this)">❤️ Like</button>
      <button>💬 Comment</button>
    </div>
    <div class="post-caption"><b>Jake:</b> Check out my new sneakers! 👟</div>
    <div class="comments" id="comments2">No comments yet.</div>
    <div class="comment-input">
      <input type="text" placeholder="Add a comment..." id="input2">
      <button onclick="addComment('input2','comments2')">Post</button>
    </div>
  </div>

</div>

<script>
function likePost(btn) {
  if(btn.textContent.includes("❤️")) {
    btn.textContent = "💔 Unlike";
  } else {
    btn.textContent = "❤️ Like";
  }
}

function addComment(inputId, commentsId) {
  const input = document.getElementById(inputId);
  const commentsDiv = document.getElementById(commentsId);
  const commentText = input.value.trim();
  if(commentText === "") return;
  
  if(commentsDiv.textContent === "No comments yet.") {
    commentsDiv.textContent = "";
  }
  commentsDiv.innerHTML += "<b>You:</b> " + commentText + "<br>";
  input.value = "";
}

function logout() {
  alert("You have been logged out.");
  location.reload();
}
</script>

</body>
</html>
